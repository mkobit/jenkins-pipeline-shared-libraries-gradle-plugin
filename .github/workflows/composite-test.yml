name: Composite build test

on:
  # TODO: remove push trigger once branch protection requires PRs for all changes,
  #       so CI only runs once per commit (via pull_request), not twice.
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      example-ref:
        description: "jenkins-pipeline-shared-library-example branch/SHA to test against (default: same branch name, then main)"
        default: ""

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  composite-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Java minimum × baseline LTS (2.479.x — Groovy 2.4 runtime)
          - name: "Java 17 / Jenkins 2.479.x"
            java: 17
            jenkins-version: "2.479.1"
            jenkins-bom: "io.jenkins.tools.bom:bom-2.479.x:5054.v620b_5d2b_d5e6"
            jenkins-test-harness: "2391.v9b_3e2d3351a_2"

          # LTS Java × baseline LTS
          - name: "Java 21 / Jenkins 2.479.x"
            java: 21
            jenkins-version: "2.479.1"
            jenkins-bom: "io.jenkins.tools.bom:bom-2.479.x:5054.v620b_5d2b_d5e6"
            jenkins-test-harness: "2391.v9b_3e2d3351a_2"

          # 2.492.x — first LTS to ship Groovy 3.x internally; key leg for Spock investigation.
          # groovy-all:2.4.21 injection via integrationTestGroovyAllRuntime may conflict here;
          # a failure on this leg is expected until the Spock/Groovy-3 strategy is resolved.
          - name: "Java 17 / Jenkins 2.492.x"
            java: 17
            jenkins-version: "2.492.3"
            jenkins-bom: "io.jenkins.tools.bom:bom-2.492.x:5473.vb_9533d9e5d88"
            jenkins-test-harness: "2397.v5992a_d47f025"

          # 2.504.x — intermediate LTS
          - name: "Java 17 / Jenkins 2.504.x"
            java: 17
            jenkins-version: "2.504.3"
            jenkins-bom: "io.jenkins.tools.bom:bom-2.504.x:5983.v443959746f1f"
            jenkins-test-harness: "2565.vd1eb_7c961d1b_"

          # 2.541.x — latest LTS; forward-compat check
          - name: "Java 17 / Jenkins 2.541.x"
            java: 17
            jenkins-version: "2.541.3"
            jenkins-bom: "io.jenkins.tools.bom:bom-2.541.x:6364.v16b_76a_4023c7"
            jenkins-test-harness: "2565.vd1eb_7c961d1b_"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: plugin

      # Resolve which example branch to test against:
      #   1. workflow_dispatch input (explicit override)
      #   2. same branch name as the current plugin branch (coordinated cross-repo changes)
      #   3. main (fallback for plugin-only changes)
      - name: Resolve example ref
        id: example-ref
        run: |
          OVERRIDE="${{ inputs.example-ref }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [ -n "$OVERRIDE" ]; then
            echo "ref=$OVERRIDE" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code \
               https://github.com/mkobit/jenkins-pipeline-shared-library-example.git \
               "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mkobit/jenkins-pipeline-shared-library-example
          ref: ${{ steps.example-ref.outputs.ref }}
          path: example

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - name: Build
        working-directory: example
        run: >
          ./gradlew --include-build ../plugin build --continue
          -PjenkinsVersion=${{ matrix.jenkins-version }}
          -PjenkinsBom=${{ matrix.jenkins-bom }}
          -PjenkinsTestHarnessVersion=${{ matrix.jenkins-test-harness }}
