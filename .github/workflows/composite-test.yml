name: Composite build test

on:
  # TODO: remove push trigger once branch protection requires PRs for all changes,
  #       so CI only runs once per commit (via pull_request), not twice.
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE.txt'
      - '.gitignore'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.github/workflows/release-please.yml'
      - '.github/workflows/pr-title-check.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE.txt'
      - '.gitignore'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.github/workflows/release-please.yml'
      - '.github/workflows/pr-title-check.yml'
  workflow_dispatch:
    inputs:
      example-ref:
        description: "jenkins-pipeline-shared-library-example branch/SHA to test against (default: same branch name, then main)"
        default: ""

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Composite build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DEVELOCITY_PUBLISH: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: jenkins-pipeline-shared-libraries-gradle-plugin

      # Resolve which example branch to test against:
      #   1. workflow_dispatch input (explicit override)
      #   2. same branch name as the current plugin branch (coordinated cross-repo changes)
      #   3. main (fallback for plugin-only changes)
      - name: Resolve example ref
        id: example-ref
        env:
          OVERRIDE: ${{ inputs.example-ref }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -n "$OVERRIDE" ]; then
            REF="$OVERRIDE"
          elif git ls-remote --exit-code \
               https://github.com/mkobit/jenkins-pipeline-shared-library-example.git \
               "refs/heads/$BRANCH" > /dev/null 2>&1; then
            REF="$BRANCH"
          else
            REF="main"
          fi
          # EOF delimiter is safe against newlines in branch names or dispatch inputs.
          printf 'ref<<EOF\n%s\nEOF\n' "$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mkobit/jenkins-pipeline-shared-library-example
          ref: ${{ steps.example-ref.outputs.ref }}
          path: example

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Build
        working-directory: example
        run: ./gradlew --include-build ../jenkins-pipeline-shared-libraries-gradle-plugin build --continue
