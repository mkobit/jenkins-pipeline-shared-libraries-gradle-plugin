name: Composite build test

on:
  # TODO: remove push trigger once branch protection requires PRs for all changes,
  #       so CI only runs once per commit (via pull_request), not twice.
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      example-ref:
        description: "jenkins-pipeline-shared-library-example branch/SHA to test against (default: same branch name, then main)"
        default: ""
      # TODO: add jenkins-version input for on-demand stretch testing

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ── Matrix generation ──────────────────────────────────────────────────────────
  # Runs `generateJenkinsCompatMatrix` and exposes the JSON file content as a job
  # output. Runs in parallel with gate so it adds no critical-path time.
  matrix-gen:
    name: Generate jenkins-compat matrix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      jenkins-matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: plugin

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Generate matrix
        working-directory: plugin
        run: ./gradlew generateJenkinsCompatMatrix --console=plain

      - id: gen
        working-directory: plugin
        run: echo "matrix=$(cat build/ci/jenkins-compat-matrix.json)" >> "$GITHUB_OUTPUT"

  # ── Gate ──────────────────────────────────────────────────────────────────────
  # Primary signal: Gradle 9.5.0 / Java 17 / Jenkins (current standard LTS).
  # Runs first to catch obvious failures fast before the jenkins-compat fan-out.
  # Resolves the example repo ref once and exposes it as a job output so
  # jenkins-compat legs do not repeat the git ls-remote probe.
  # Jenkins version parameters come from generateJenkinsGateParams (MatrixCli.kt).
  gate:
    name: Gate (Gradle 9.5.0 / Java 17 / Jenkins current LTS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    outputs:
      example-ref: ${{ steps.example-ref.outputs.ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: plugin

      # Resolve which example branch to test against:
      #   1. workflow_dispatch input (explicit override)
      #   2. same branch name as the current plugin branch (coordinated cross-repo changes)
      #   3. main (fallback for plugin-only changes)
      - name: Resolve example ref
        id: example-ref
        run: |
          OVERRIDE="${{ inputs.example-ref }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [ -n "$OVERRIDE" ]; then
            echo "ref=$OVERRIDE" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code \
               https://github.com/mkobit/jenkins-pipeline-shared-library-example.git \
               "refs/heads/$BRANCH" > /dev/null 2>&1; then
            echo "ref=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "ref=main" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mkobit/jenkins-pipeline-shared-library-example
          ref: ${{ steps.example-ref.outputs.ref }}
          path: example

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Generate gate parameters
        working-directory: plugin
        run: ./gradlew generateJenkinsGateParams --console=plain

      - name: Read gate parameters
        id: gate-params
        working-directory: plugin
        run: echo "params=$(cat build/ci/jenkins-gate-params.json)" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: example
        env:
          JENKINS_VERSION: ${{ fromJSON(steps.gate-params.outputs.params).jenkins-version }}
          JENKINS_BOM_VERSION: ${{ fromJSON(steps.gate-params.outputs.params).jenkins-bom-version }}
          JENKINS_TEST_HARNESS_VERSION: ${{ fromJSON(steps.gate-params.outputs.params).jenkins-test-harness }}
        run: >
          ./gradlew --include-build ../plugin
          --init-script ../plugin/.github/ci/jenkins-version.init.gradle.kts
          build --continue
          -PjenkinsVersion=$JENKINS_VERSION
          -PjenkinsBomVersion=$JENKINS_BOM_VERSION
          -PjenkinsTestHarnessVersion=$JENKINS_TEST_HARNESS_VERSION

  # ── Jenkins LTS compatibility ─────────────────────────────────────────────────
  # Sanity-check the composite build against the floor and latest LTS lines using
  # the wrapper Gradle version. Gradle compatibility is covered by the plugin's own
  # build.yml via GradleTestKit and does not need to be repeated here.
  # 2.528.x / Java 17 is covered by the gate; these legs add:
  #   - floor LTS (2.479.x) at minimum Java
  #   - latest LTS (2.541.x) at maximum Java and latest Java (forward-compat)
  # Matrix is generated by the matrix-gen job from buildSrc/src/main/kotlin/CiMatrix.kt.
  jenkins-compat:
    name: Gradle 9.5.0 / Java ${{ matrix.java }} / Jenkins ${{ matrix.jenkins-lts }}
    needs: [gate, matrix-gen]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.jenkins-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: plugin

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mkobit/jenkins-pipeline-shared-library-example
          ref: ${{ needs.gate.outputs.example-ref }}
          path: example

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Build
        working-directory: example
        run: >
          ./gradlew --include-build ../plugin
          --init-script ../plugin/.github/ci/jenkins-version.init.gradle.kts
          build --continue
          -PjenkinsVersion=${{ matrix.jenkins-version }}
          -PjenkinsBomVersion=${{ matrix.jenkins-bom-version }}
          -PjenkinsTestHarnessVersion=${{ matrix.jenkins-test-harness }}
