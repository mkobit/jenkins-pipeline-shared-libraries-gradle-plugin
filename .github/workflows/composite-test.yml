name: Composite build test

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed
    branches:
      - the-phoenix-project
      - main

permissions: {}

jobs:
  composite-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Java minimum × current Jenkins LTS (2.479.x baseline)
          - name: "Java 17 / Jenkins 2.479.x"
            java: 17
            jenkins-version: "2.479.1"
            jenkins-bom: "io.jenkins.tools.bom:bom-2.479.x:5054.v620b_5d2b_d5e6"
            jenkins-test-harness: "2391.v9b_3e2d3351a_2"

          # LTS Java × current Jenkins
          - name: "Java 21 / Jenkins 2.479.x"
            java: 21
            jenkins-version: "2.479.1"
            jenkins-bom: "io.jenkins.tools.bom:bom-2.479.x:5054.v620b_5d2b_d5e6"
            jenkins-test-harness: "2391.v9b_3e2d3351a_2"

          # TODO: add newer Jenkins LTS lines when BOM coordinates are confirmed, e.g.:
          # - name: "Java 17 / Jenkins 2.492.x"
          #   java: 17
          #   jenkins-version: "..."
          #   jenkins-bom: "io.jenkins.tools.bom:bom-2.492.x:..."
          #   jenkins-test-harness: "..."

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          path: plugin

      # TODO: update ref to main once migration from the-phoenix-project is complete
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          repository: mkobit/jenkins-pipeline-shared-library-example
          ref: the-phoenix-project
          path: example

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e  # v6

      - name: Build
        working-directory: example
        run: >
          ./gradlew --include-build ../plugin build --continue
          -PjenkinsVersion=${{ matrix.jenkins-version }}
          -PjenkinsBom=${{ matrix.jenkins-bom }}
          -PjenkinsTestHarnessVersion=${{ matrix.jenkins-test-harness }}
