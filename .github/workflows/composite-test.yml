name: Composite build test

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      example-ref:
        description: "jenkins-pipeline-shared-library-example branch/SHA to test against (default: main)"
        default: ""

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: Composite build
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      DEVELOCITY_PUBLISH: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: jenkins-pipeline-shared-libraries-gradle-plugin

      - name: Resolve example ref
        id: example-ref
        env:
          OVERRIDE: ${{ inputs.example-ref }}
        run: |
          REF="${OVERRIDE:-main}"
          printf 'ref<<EOF\n%s\nEOF\n' "$REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: mkobit/jenkins-pipeline-shared-library-example
          ref: ${{ steps.example-ref.outputs.ref }}
          path: example

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin

      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Build
        working-directory: example
        run: ./gradlew --include-build ../jenkins-pipeline-shared-libraries-gradle-plugin build --continue
