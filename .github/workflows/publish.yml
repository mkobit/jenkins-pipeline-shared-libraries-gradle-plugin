name: Publish to Gradle Plugin Portal

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish — must match version in gradle.properties'
        required: true
        type: string

permissions: {}

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to Gradle Plugin Portal
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Validate version format
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: version must be MAJOR.MINOR.PATCH digits only, got: $INPUT_VERSION"
            exit 1
          fi

      - name: Verify version matches gradle.properties
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          CURRENT=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ "$CURRENT" != "$INPUT_VERSION" ]; then
            echo "ERROR: gradle.properties has '$CURRENT' but input is '$INPUT_VERSION'"
            exit 1
          fi

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          cache-disabled: true
      - name: Publish to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins
