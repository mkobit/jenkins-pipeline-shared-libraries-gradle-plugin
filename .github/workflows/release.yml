name: Release

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override — leave blank to read from build.gradle.kts'
        required: false
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # workflow_run path: Build passed on main AND commit is a Release Please release commit.
    # Dispatch path: always runs (gated by repo write access).
    if: >-
      github.event_name == 'workflow_dispatch' || (
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_commit.message, 'chore: release '))
    permissions:
      contents: write
    steps:
      # Pin to the exact commit Build ran on; HEAD of default branch on dispatch.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Read and validate version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          FILE_VERSION=$(grep '^version=' gradle.properties | cut -d= -f2)
          if [ -n "$INPUT_VERSION" ]; then
            if ! [[ "$INPUT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: version must be MAJOR.MINOR.PATCH, got: $INPUT_VERSION"
              exit 1
            fi
            if [ "$FILE_VERSION" != "$INPUT_VERSION" ]; then
              echo "ERROR: gradle.properties has '$FILE_VERSION' but input is '$INPUT_VERSION'"
              exit 1
            fi
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            if ! [[ "$FILE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: version in gradle.properties must be MAJOR.MINOR.PATCH, got: $FILE_VERSION"
              exit 1
            fi
            echo "version=$FILE_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: temurin

      # Build cache disabled: prevents PR build outputs from influencing published artifacts.
      # Distribution and dependency caches are safe (content-addressed); only task outputs are excluded.
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Publish to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins --no-build-cache

      - name: Create and push tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${VERSION}" > /dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping"
          else
            git tag -a "v${VERSION}" -m "Release ${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists — skipping"
          else
            gh release create "v${VERSION}" \
              --generate-notes \
              --title "Release v${VERSION}" \
              build/libs/*.jar
          fi
