name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override — leave blank to read from build.gradle.kts'
        required: false
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Check release trigger
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Determine if release needed
        id: check
        env:
          EVENT: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          read_version_from_file() {
            grep '^version = ' build.gradle.kts | sed 's/version = "//;s/"//'
          }
          validate_format() {
            if ! [[ "$1" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "ERROR: version must be MAJOR.MINOR.PATCH, got: $1"
              exit 1
            fi
          }

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_VERSION" ]; then
              validate_format "$INPUT_VERSION"
              CURRENT=$(read_version_from_file)
              if [ "$CURRENT" != "$INPUT_VERSION" ]; then
                echo "ERROR: build.gradle.kts has '$CURRENT' but input is '$INPUT_VERSION'"
                exit 1
              fi
              VERSION="$INPUT_VERSION"
            else
              VERSION=$(read_version_from_file)
              validate_format "$VERSION"
            fi
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            # Push to main — fire only on Release Please merge commits
            if echo "$COMMIT_MSG" | grep -qE '^chore: release [0-9]+\.[0-9]+\.[0-9]+'; then
              VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
              echo "release=true" >> "$GITHUB_OUTPUT"
              echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            else
              echo "release=false" >> "$GITHUB_OUTPUT"
              echo "version=" >> "$GITHUB_OUTPUT"
            fi
          fi

  release:
    name: Release v${{ needs.check.outputs.version }}
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Publish to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

      - name: Build KDoc
        run: ./gradlew dokkaGeneratePublicationHtml

      - name: Create and push tag
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${VERSION}" > /dev/null 2>&1; then
            echo "Tag v${VERSION} already exists — skipping"
          else
            git tag -a "v${VERSION}" -m "Release ${VERSION}"
            git push origin "v${VERSION}"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} already exists — skipping"
          else
            gh release create "v${VERSION}" \
              --generate-notes \
              --title "Release v${VERSION}" \
              build/libs/*.jar
          fi

      - name: Deploy versioned KDoc
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/dokka/html
          destination_dir: v${{ needs.check.outputs.version }}
          commit_message: "docs: publish v${{ needs.check.outputs.version }}"
          keep_files: true

      - name: Deploy root KDoc (latest)
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/dokka/html
          destination_dir: .
          commit_message: "docs: update root from v${{ needs.check.outputs.version }}"
          keep_files: true

      - name: Update versions index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/versions-index
          {
            printf '<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="utf-8">\n'
            printf '<title>Versions — Jenkins Pipeline Shared Library Plugin</title>\n'
            printf '<style>body{font-family:sans-serif;max-width:600px;margin:2em auto}'
            printf 'a{display:block;margin:.5em 0}small{color:#666}</style>\n'
            printf '</head>\n<body>\n<h1>Published versions</h1>\n'
            printf '<p><a href="../">Latest (main)</a></p>\n'
            gh release list \
              --repo mkobit/jenkins-pipeline-shared-libraries-gradle-plugin \
              --limit 50 --json tagName,publishedAt \
              --jq '.[] | "<a href=\"../" + .tagName + "/\">" + .tagName
                    + " <small>(" + (.publishedAt | split("T")[0]) + ")</small></a>"'
            printf '\n</body>\n</html>\n'
          } > /tmp/versions-index/index.html

      - name: Deploy versions index
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/versions-index
          destination_dir: versions
          commit_message: "docs: update versions index for v${{ needs.check.outputs.version }}"
          keep_files: true
