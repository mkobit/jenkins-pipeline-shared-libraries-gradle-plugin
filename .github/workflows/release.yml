name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.11.0) — must match version in build.gradle.kts'
        required: true
        type: string

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release v${{ inputs.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: Verify version matches build.gradle.kts
        run: |
          CURRENT=$(grep '^version = ' build.gradle.kts | sed 's/version = "//;s/"//')
          if [ "$CURRENT" != "${{ inputs.version }}" ]; then
            echo "ERROR: build.gradle.kts has '$CURRENT' but release input is '${{ inputs.version }}'"
            exit 1
          fi

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Publish to Gradle Plugin Portal
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

      - name: Build KDoc
        run: ./gradlew dokkaGeneratePublicationHtml

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "v${{ inputs.version }}" > /dev/null 2>&1; then
            echo "Tag v${{ inputs.version }} already exists — skipping"
          else
            git tag -a "v${{ inputs.version }}" -m "Release ${{ inputs.version }}"
            git push origin "v${{ inputs.version }}"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --generate-notes \
            --title "Release v${{ inputs.version }}" \
            build/libs/*.jar

      - name: Deploy versioned KDoc
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/dokka/html
          destination_dir: v${{ inputs.version }}
          commit_message: "docs: publish v${{ inputs.version }}"
          keep_files: true

      - name: Deploy root KDoc (latest)
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/dokka/html
          destination_dir: .
          commit_message: "docs: update root from v${{ inputs.version }}"
          keep_files: true

      - name: Update versions index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/versions-index
          {
            printf '<!DOCTYPE html>\n<html lang="en">\n<head><meta charset="utf-8">\n'
            printf '<title>Versions — Jenkins Pipeline Shared Library Plugin</title>\n'
            printf '<style>body{font-family:sans-serif;max-width:600px;margin:2em auto}'
            printf 'a{display:block;margin:.5em 0}small{color:#666}</style>\n'
            printf '</head>\n<body>\n<h1>Published versions</h1>\n'
            printf '<p><a href="../">Latest (main)</a></p>\n'
            gh release list \
              --repo mkobit/jenkins-pipeline-shared-libraries-gradle-plugin \
              --limit 50 --json tagName,publishedAt \
              --jq '.[] | "<a href=\"../" + .tagName + "/\">" + .tagName
                    + " <small>(" + (.publishedAt | split("T")[0]) + ")</small></a>"'
            printf '\n</body>\n</html>\n'
          } > /tmp/versions-index/index.html

      - name: Deploy versions index
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/versions-index
          destination_dir: versions
          commit_message: "docs: update versions index for v${{ inputs.version }}"
          keep_files: true
