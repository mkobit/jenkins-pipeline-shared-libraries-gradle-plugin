name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

# head_ref is set for pull_request events (source branch name); ref_name is set for
# push events (target branch). Using head_ref || ref_name groups a push to a PR branch
# and the corresponding pull_request event together so the second cancels the first.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Gate: Java 17 / Gradle 9.4.1 — fast sanity check before matrix fan-out.
  # Runs build (unit + non-resolution functional tests). No Jenkins Maven repo calls.
  # Populates the Gradle 9.4.1 dependency cache for reuse by java-compat.
  gate:
    name: Gate (Java 17 / Gradle 9.4.1)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Build
        run: ./gradlew build --continue

  # Gradle compat: Java 17 × supported 9.x minor versions (9.4.1 covered by gate).
  # Tests use GradleTestKit to invoke the specific Gradle version; the build wrapper
  # always uses 9.4.1. Each Gradle version has its own TestKit cache entry.
  # Includes resolution tests that hit the Jenkins Maven repo.
  gradle-compat:
    name: Gradle ${{ matrix.gradle }} (Java 17)
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - gradle: "9.0.0"
            task_suffix: "9_0_0"
          - gradle: "9.1.0"
            task_suffix: "9_1_0"
          - gradle: "9.2.1"
            task_suffix: "9_2_1"
          - gradle: "9.3.1"
            task_suffix: "9_3_1"
          - gradle: "9.5.0"
            task_suffix: "9_5_0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Functional tests (Gradle ${{ matrix.gradle }})
        run: ./gradlew functionalTest${{ matrix.task_suffix }} --continue
      - name: Functional tests (resolution)
        run: ./gradlew functionalTest --continue -Pkotest.tags=resolution -Ptest.gradle.version=${{ matrix.gradle }}

  # Platform compat: Windows and macOS — Java 21 / Gradle 9.4.1 (wrapper).
  # Runs after gate as a platform sanity check: path-separator handling, shell quoting,
  # and file-system behaviour under GradleTestKit. Single Gradle version keeps the
  # concurrent-daemon memory budget inside the macOS runner limit (3 vCPU / 7 GB).
  # Each OS has its own Gradle cache key; cache-read-only is intentionally omitted so
  # each platform can seed its own cache on first run.
  # NOTE: update functionalTest9_4_1 when the wrapper version bumps.
  platform-compat:
    name: ${{ matrix.os }} / Java 21 / Gradle 9.4.1
    needs: gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 21
      - name: Unit tests
        run: ./gradlew test --continue
      - name: Functional tests (Gradle 9.4.1)
        run: ./gradlew functionalTest9_4_1 --continue

  # Java compat: LTS Java (21) and latest Java (25) × Gradle 9.4.1.
  # Tests only Gradle 9.4.1 — cross-Gradle coverage is in gradle-compat.
  # cache-read-only: gate already wrote the 9.4.1 cache; avoid redundant parallel writes.
  java-compat:
    name: Java ${{ matrix.java }} / Gradle 9.4.1
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ matrix.java }}
          cache-read-only: "true"
      - name: Build (compile and unit tests)
        run: ./gradlew test --continue
      - name: Functional tests (Gradle 9.4.1)
        run: ./gradlew functionalTest9_4_1 --continue
      - name: Functional tests (resolution)
        run: ./gradlew functionalTest --continue -Pkotest.tags=resolution
