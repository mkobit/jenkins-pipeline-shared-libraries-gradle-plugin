name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

# head_ref is set for pull_request events (source branch name); ref_name is set for
# push events (target branch). Using head_ref || ref_name groups a push to a PR branch
# and the corresponding pull_request event together so the second cancels the first.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Gate: Java 17 / Gradle 9.4.1 — fast sanity check before matrix fan-out.
  # Runs build (unit + non-resolution functional tests). No Jenkins Maven repo calls.
  # Populates the Gradle 9.4.1 dependency cache for reuse by java-compat.
  gate:
    name: Gate (Java 17 / Gradle 9.4.1)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
          gradle-version: "9.4.1"
      - name: Build
        run: gradle build --continue

  # Gradle compat: Java 17 × supported 9.x minor versions (9.4.1 covered by gate).
  # Each Gradle version has its own cache key; first run downloads and caches the
  # distribution, subsequent runs restore it. Includes resolution tests.
  gradle-compat:
    name: Gradle ${{ matrix.gradle }} (Java 17)
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        gradle:
          - "9.0.0"
          - "9.1.0"
          - "9.2.1"
          - "9.3.1"
          - "9.5.0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
          gradle-version: ${{ matrix.gradle }}
      - name: Build
        run: gradle build --continue
      - name: Functional tests (resolution)
        run: gradle functionalTest --continue -Pkotest.tags=resolution

  # Java compat: LTS Java (21) and latest Java (24) × Gradle 9.4.1.
  # cache-read-only: gate already wrote the 9.4.1 cache; avoid redundant parallel writes.
  java-compat:
    name: Java ${{ matrix.java }} / Gradle 9.4.1
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        java: [21, 24]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ matrix.java }}
          gradle-version: "9.4.1"
          cache-read-only: "true"
      - name: Build
        run: gradle build --continue
      - name: Functional tests (resolution)
        run: gradle functionalTest --continue -Pkotest.tags=resolution
