name: Build

on:
  # TODO: remove push trigger once branch protection requires PRs for all changes,
  #       so CI only runs once per commit (via pull_request), not twice.
  push:
    branches:
      - main
  pull_request:

permissions: {}

# head_ref is set for pull_request events (source branch name); ref_name is set for
# push events (target branch). Using head_ref || ref_name groups a push to a PR branch
# and the corresponding pull_request event together so the second cancels the first.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Gate: Java 17 + current Gradle — fast sanity check before matrix fan-out.
  # Runs build (unit + non-resolution functional tests). No Jenkins Maven repo calls.
  # Populates the Gradle 9.4.1 dependency cache for reuse by java-21 and java-latest.
  gate:
    name: Gate (Java 17 / Gradle 9.4.1)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          gradle-version: "9.4.1"
      - name: Build
        run: gradle build --continue

  # Gradle compat: Java 17 × older 9.x minor versions (9.4.1 already covered by gate).
  # Each Gradle version has its own cache key; first run downloads and caches the
  # distribution, subsequent runs restore it. Includes resolution tests.
  gradle-compat:
    name: Gradle ${{ matrix.gradle }} (Java 17)
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        gradle:
          - "9.0.0"
          - "9.1.0"
          - "9.2.1"
          - "9.3.1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 17
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          gradle-version: ${{ matrix.gradle }}
      - name: Build
        run: gradle build --continue
      - name: Functional tests (resolution)
        run: gradle functionalTest --continue -Pkotest.tags=resolution

  # Java 21 + current Gradle: LTS Java compat.
  # cache-read-only: gate already wrote the 9.4.1 cache; avoid a redundant parallel write.
  java-21:
    name: Java 21 / Gradle 9.4.1
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 21
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          gradle-version: "9.4.1"
          cache-read-only: true
      - name: Build
        run: gradle build --continue
      - name: Functional tests (resolution)
        run: gradle functionalTest --continue -Pkotest.tags=resolution

  # Latest Java + current Gradle: forward-compat check.
  # cache-read-only: same rationale as java-21.
  java-latest:
    name: Java 24 / Gradle 9.4.1
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: 24
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
        with:
          gradle-version: "9.4.1"
          cache-read-only: true
      - name: Build
        run: gradle build --continue
      - name: Functional tests (resolution)
        run: gradle functionalTest --continue -Pkotest.tags=resolution
