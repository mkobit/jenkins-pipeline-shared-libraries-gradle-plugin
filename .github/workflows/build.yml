name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

# head_ref is set for pull_request events (source branch name); ref_name is set for
# push events (target branch). Using head_ref || ref_name groups a push to a PR branch
# and the corresponding pull_request event together so the second cancels the first.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # ── Matrix generation ──────────────────────────────────────────────────────────
  # Runs `generateGradleCompatMatrix` and exposes the JSON file content as a job
  # output. Runs in parallel with gate so it adds no critical-path time.
  matrix-gen:
    name: Generate CI matrices
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      gradle-matrix: ${{ steps.gen.outputs.gradle-matrix }}
      java-matrix: ${{ steps.gen.outputs.java-matrix }}
      jenkins-matrix: ${{ steps.gen.outputs.jenkins-matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Generate matrices
        run: ./gradlew generateGradleCompatMatrix generateJavaCompatMatrix generateJenkinsCompatMatrix --console=plain
      - id: gen
        run: |
          echo "gradle-matrix=$(cat build/ci/gradle-compat-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "java-matrix=$(cat build/ci/java-compat-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "jenkins-matrix=$(cat build/ci/jenkins-compat-matrix.json)" >> "$GITHUB_OUTPUT"

  # Gate: Gradle 9.5.0 / Java 17 — fast sanity check before matrix fan-out.
  # Compile + style + unit tests run first (fail fast); then current-Gradle functional
  # tests. No Jenkins Maven repo calls. Populates the dependency cache for java-compat.
  # gradle-compat fan-out covers all Gradle versions (including 9.5.0 as a cache hit).
  gate:
    name: Gate (Gradle 9.5.0 / Java 17)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Compile, style, and unit tests
        run: ./gradlew spotlessCheck test
      - name: Functional tests (current Gradle)
        run: ./gradlew assemble validatePlugins functionalTestCurrentWrapper
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Gate'
          fail_on_failure: false

  # Gradle compat: all Gradle 9.x versions × Java 17, including 9.5.0 (cache hit from gate).
  # Tests use GradleTestKit to invoke the specific Gradle version; the build wrapper
  # always uses 9.5.0. Each Gradle version has its own TestKit cache entry.
  # Includes resolution tests that hit the Jenkins Maven repo.
  # Matrix is generated by the matrix-gen job from MatrixCli.kt.
  gradle-compat:
    name: Gradle ${{ matrix.gradle }} / Java 17
    needs: [gate, matrix-gen]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.gradle-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Functional tests (Gradle ${{ matrix.gradle }})
        run: ./gradlew functionalTest --continue -Ptest.gradle.version="${{ matrix.gradle }}"
      - name: Functional tests (resolution)
        run: ./gradlew functionalTest --continue -Pkotest.tags=resolution -Ptest.gradle.version="${{ matrix.gradle }}"
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Gradle ${{ matrix.gradle }}'
          fail_on_failure: false

  # Platform compat: Windows and macOS — current Gradle / Java 21.
  # Runs after gate as a platform sanity check: path-separator handling, shell quoting,
  # and file-system behaviour under GradleTestKit. Single Gradle version keeps the
  # concurrent-daemon memory budget inside the macOS runner limit (3 vCPU / 7 GB).
  # Each OS has its own Gradle cache key; cache-read-only is intentionally omitted so
  # each platform can seed its own cache on first run.
  platform-compat:
    name: ${{ matrix.os }} / Gradle 9.5.0 / Java 21
    needs: gate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --system core.longpaths true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 21
      - name: Unit tests
        run: ./gradlew test --continue
      - name: Functional tests (current Gradle)
        run: ./gradlew functionalTestCurrentWrapper --continue
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — ${{ matrix.os }}'
          fail_on_failure: false

  # Jenkins LTS compat: resolution tests × each supported Jenkins LTS line, Gradle 9.5.0 / Java 17.
  # Gradle compat coverage is in gradle-compat; these legs only vary Jenkins version.
  # Matrix generated by generateJenkinsCompatMatrix (MatrixCli.kt).
  jenkins-compat:
    name: Jenkins ${{ matrix.jenkins-lts }} / Gradle 9.5.0 / Java 17
    needs: [gate, matrix-gen]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.jenkins-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Jenkins compat tests (Jenkins ${{ matrix.jenkins-lts }})
        run: ./gradlew functionalTest --continue -Pkotest.tags=jenkins-compat -Ptest.jenkins.version="${{ matrix.jenkins-version }}"
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Jenkins ${{ matrix.jenkins-lts }}'
          fail_on_failure: false

  # Java compat: Gradle 9.5.0 × LTS Java and latest Java.
  # Tests only Gradle 9.5.0 — cross-Gradle coverage is in gradle-compat.
  # Matrix is generated by the matrix-gen job from src/ciMatrix/…/MatrixCli.kt.
  # cache-read-only: gate already wrote the 9.5.0 cache; avoid redundant parallel writes.
  java-compat:
    name: Gradle 9.5.0 / Java ${{ matrix.java }}
    needs: [gate, matrix-gen]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.java-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ matrix.java }}
          cache-read-only: "true"
      - name: Build (compile and unit tests)
        run: ./gradlew test --continue
      - name: Functional tests (current Gradle)
        run: ./gradlew functionalTestCurrentWrapper --continue
      - name: Functional tests (resolution)
        run: ./gradlew functionalTest --continue -Pkotest.tags=resolution -Ptest.gradle.version=current
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Java ${{ matrix.java }}'
          fail_on_failure: false
