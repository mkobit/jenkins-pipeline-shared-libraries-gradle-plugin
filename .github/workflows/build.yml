name: Build

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE.txt'
      - '.gitignore'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.github/dependabot.yml'
      - '.github/workflows/release-please.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/pr-title-check.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE.txt'
      - '.gitignore'
      - 'release-please-config.json'
      - '.release-please-manifest.json'
      - '.github/dependabot.yml'
      - '.github/workflows/release-please.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/pr-title-check.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build-config:
    name: Generate build config
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      gradle-version: ${{ steps.gen.outputs.gradle-version }}
      java-version: ${{ steps.gen.outputs.java-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Generate build config
        run: ./gradlew generateBuildConfig --console=plain
      - id: gen
        run: |
          echo "gradle-version=$(jq -r '."gradle-version"' build/ci/build-config.json)" >> "$GITHUB_OUTPUT"
          echo "java-version=$(jq -r '."java-version"' build/ci/build-config.json)" >> "$GITHUB_OUTPUT"

  matrix-gen:
    name: Generate CI matrices
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      gradle-matrix: ${{ steps.gen.outputs.gradle-matrix }}
      java-matrix: ${{ steps.gen.outputs.java-matrix }}
      jenkins-matrix: ${{ steps.gen.outputs.jenkins-matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: 17
      - name: Generate matrices
        run: ./gradlew generateGradleCompatMatrix generateJavaCompatMatrix generateJenkinsCompatMatrix --console=plain
      - name: Validate matrix task suffixes
        run: |
          for f in build/ci/gradle-compat-matrix.json \
                   build/ci/java-compat-matrix.json \
                   build/ci/jenkins-compat-matrix.json; do
            if ! jq -e '[.include[]["task-suffix"] // ""] | all(test("^[A-Za-z0-9_-]*$"))' "$f" > /dev/null; then
              echo "ERROR: unexpected task-suffix value in $f" >&2
              exit 1
            fi
          done
      - id: gen
        run: |
          echo "gradle-matrix=$(cat build/ci/gradle-compat-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "java-matrix=$(cat build/ci/java-compat-matrix.json)" >> "$GITHUB_OUTPUT"
          echo "jenkins-matrix=$(cat build/ci/jenkins-compat-matrix.json)" >> "$GITHUB_OUTPUT"

  gate:
    name: Gate (Gradle ${{ needs.build-config.outputs.gradle-version }} / Java ${{ needs.build-config.outputs.java-version }})
    needs: [build-config]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      checks: write
    env:
      DEVELOCITY_PUBLISH: "1"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ needs.build-config.outputs.java-version }}
      - name: Compile, style, and unit tests
        run: ./gradlew spotlessCheck test
      - name: Functional tests (gate)
        run: ./gradlew assemble validatePlugins functionalTest
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Gate'
          fail_on_failure: false

  gradle-compat:
    name: Gradle ${{ matrix.gradle }} / Java ${{ needs.build-config.outputs.java-version }}
    needs: [gate, matrix-gen, build-config]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.gradle-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ needs.build-config.outputs.java-version }}
      - name: Functional tests (Gradle ${{ matrix.gradle }})
        run: ./gradlew functionalTest${{ matrix.task-suffix }}
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Gradle ${{ matrix.gradle }}'
          fail_on_failure: false

  platform-compat:
    name: ${{ matrix.os }} / Gradle ${{ needs.build-config.outputs.gradle-version }} / Java 21
    needs: [gate, build-config]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - name: Enable long paths (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: git config --system core.longpaths true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ needs.build-config.outputs.java-version }}
      - name: Unit tests
        run: ./gradlew test --continue
      - name: Functional tests (current Gradle × all Java versions)
        run: ./gradlew functionalTest --continue
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — ${{ matrix.os }}'
          fail_on_failure: false

  jenkins-compat:
    name: Jenkins ${{ matrix.jenkins-lts }} / Gradle ${{ needs.build-config.outputs.gradle-version }} / Java ${{ needs.build-config.outputs.java-version }}
    needs: [gate, matrix-gen, build-config]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.jenkins-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ needs.build-config.outputs.java-version }}
      - name: Jenkins compat tests (Jenkins ${{ matrix.jenkins-lts }})
        run: ./gradlew functionalTest${{ matrix.task-suffix }}
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Jenkins ${{ matrix.jenkins-lts }}'
          fail_on_failure: false

  java-compat:
    name: Gradle ${{ needs.build-config.outputs.gradle-version }} / Java ${{ matrix.java }}
    needs: [gate, matrix-gen, build-config]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix-gen.outputs.java-matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: ./.github/actions/setup-env
        with:
          java-version: ${{ needs.build-config.outputs.java-version }}
          cache-read-only: "true"
      - name: Functional tests (Java ${{ matrix.java }})
        run: ./gradlew functionalTest${{ matrix.task-suffix }} --continue
      - name: Publish test results
        if: always()
        uses: mikepenz/action-junit-report@bccf2e31636835cf0874589931c4116687171386
        with:
          report_paths: 'build/test-results/**/*.xml'
          check_name: 'Test results — Java ${{ matrix.java }}'
          fail_on_failure: false
