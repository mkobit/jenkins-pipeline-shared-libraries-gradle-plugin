name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main

permissions: {}

# Allow only one deployment at a time.
concurrency:
  group: pages-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Dokka HTML
    # release.yml handles docs on release commits; skip here to avoid gh-pages race
    if: "!startsWith(github.event.head_commit.message, 'chore: release ')"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17'
          distribution: temurin
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e
      - name: Generate Dokka HTML
        run: ./gradlew dokkaGeneratePublicationHtml
      - name: Deploy to root (latest)
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/dokka/html
          destination_dir: .
          commit_message: "docs: update root from main (${{ github.sha }})"
          keep_files: true
