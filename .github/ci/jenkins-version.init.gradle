// CI-only init script: forwards -P project properties to the sharedLibrary extension.
// Keeps the example's build.gradle.kts free of findProperty clutter.
allprojects {
    pluginManager.withPlugin("com.mkobit.jenkins.pipelines.shared-library") {
        def ext = extensions.getByName("sharedLibrary")
        if (hasProperty("jenkinsVersion")) {
            ext.jenkins.version.set(getProperty("jenkinsVersion") as String)
        }
        if (hasProperty("jenkinsBomVersion")) {
            ext.jenkins.bomVersion.set(getProperty("jenkinsBomVersion") as String)
        }
        if (hasProperty("jenkinsTestHarnessVersion")) {
            ext.jenkins.testHarnessVersion.set(getProperty("jenkinsTestHarnessVersion") as String)
        }
    }
}
