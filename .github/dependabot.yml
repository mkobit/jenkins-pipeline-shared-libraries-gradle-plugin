version: 2
updates:
  - package-ecosystem: "gradle"
    # Unlike the CI examples matrix (auto-generated by generateExamplesMatrix), dependabot
    # cannot discover directories dynamically. Add a new entry here when adding an example.
    directories:
      - "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependency-management"
    cooldown:
      default-days: 14
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      jetbrains:
        patterns:
          - "org.jetbrains.*:*"
      kotest:
        patterns:
          - "io.kotest:*"
      testing:
        patterns:
          - "io.mockk:*"
          - "com.squareup.okhttp3:*"
          - "org.junit.*:*"

  - package-ecosystem: "gradle"
    # Unlike the CI examples matrix (auto-generated by generateExamplesMatrix), dependabot
    # cannot discover directories dynamically. Add a new entry here when adding an example.
    directories:
      - "/examples/additional-test-suites"
      - "/examples/basic"
      - "/examples/explicit-library-name"
      - "/examples/junit-groovy"
      - "/examples/kotest"
      - "/examples/library-resource"
      - "/examples/version-catalog"
    schedule:
      interval: "weekly"
    labels:
      - "dependency-management"
    cooldown:
      default-days: 14
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      - dependency-name: "gradle"
      - dependency-name: "gradle-wrapper"
    groups:
      jetbrains:
        patterns:
          - "org.jetbrains.*:*"
      kotest:
        patterns:
          - "io.kotest:*"
      testing:
        patterns:
          - "io.mockk:*"
          - "com.squareup.okhttp3:*"
          - "org.junit.*:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "infrastructure"
    cooldown:
      default-days: 30
    commit-message:
      prefix: "infra"
      include: "scope"
    groups:
      github-actions-first-party:
        patterns:
          - "actions/*"
      gradle-actions:
        patterns:
          - "gradle/*"
      third-party-actions:
        patterns:
          - "*"
