version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
    groups:
      kotest:
        patterns:
          - "io.kotest:*"
      okhttp:
        patterns:
          - "com.squareup.okhttp3:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 30
    groups:
      github-actions-first-party:
        patterns:
          - "actions/*"
      gradle-actions:
        patterns:
          - "gradle/*"
      # Catches everything not already claimed by github-actions-first-party or gradle-actions
      # above — Dependabot uses first-match-wins group assignment so no exclusions needed.
      third-party-actions:
        patterns:
          - "*"
