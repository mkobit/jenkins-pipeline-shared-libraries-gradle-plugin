version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependency-management"
    cooldown:
      default-days: 14
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      jetbrains:
        patterns:
          - "org.jetbrains.*:*"
      kotest:
        patterns:
          - "io.kotest:*"
      testing:
        patterns:
          - "io.mockk:*"
          - "com.squareup.okhttp3:*"
          - "org.junit.*:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "infrastructure"
    cooldown:
      default-days: 30
    commit-message:
      prefix: "infra"
      include: "scope"
    groups:
      github-actions-first-party:
        patterns:
          - "actions/*"
      gradle-actions:
        patterns:
          - "gradle/*"
      third-party-actions:
        patterns:
          - "*"
